name: YouTube Live Link Updater

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Deponu kopyala
      uses: actions/checkout@v3

    - name: Python mühitini qur
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Linkləri Yenilə
      run: python update_live.py

    - name: Dəyişiklikləri GitHub-a yüklə
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        # Əgər .m3u8 faylı yaranıbsa, add et, yoxdursa xəta vermədən keç
        git add *.m3u8 2>/dev/null || true
        # Dəyişiklik olub-olmadığını yoxla və commit et
        if git diff --staged --quiet; then
          print "Yenilənəcək fayl tapılmadı və ya dəyişiklik yoxdur."
        else
          git commit -m "Canlı yayın linkləri avtomatik yeniləndi"
          git push
        fi
