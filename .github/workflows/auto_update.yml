name: YouTube Live Link Updater

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
    - name: Deponu kopyala
      uses: actions/checkout@v3

    - name: Python mühitini qur
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: En son yt-dlp proqramini yukle
      run: |
        python3 -m pip install --upgrade yt-dlp

    - name: Linkleri yt-dlp ile darmadagin et ve m3u8 yarat
      run: |
        # Bura istədiyin Kanal ID-sini yazırsan
        # yt-dlp birbaşa YouTube-un daxili canlı yayın linkini söküb çıxarır
        yt-dlp --proxy "http://pubproxy.com/api/proxy" -g "https://www.youtube.com/channel/UC0GKelxahF1nHwKyGhfJVYA/live" > live_link.txt || echo "Yayin tapilmadi"

        
        # Əgər link tapılıbsa, təmiz m3u8 faylı formatına salırıq
        if [ -s live_link.txt ]; then
          LINK=$(cat live_link.txt)
          echo -e "#EXTM3U\n#EXTINF:-1,Menim_Tv\n$LINK" > UC0GKelxahF1nHwKyGhfJVYA.m3u8
          echo "Fayl ugurla yaradildi!"
        else
          echo "Canli yayim linki alina bilmedi."
        fi

    - name: Dəyişiklikləri GitHub-a yüklə
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add *.m3u8 2>/dev/null || true
        if git diff --staged --quiet; then
          echo "Yenilenmeli bir sey yoxdur."
        else
          git commit -m "Canli yayin linki yt-dlp ile yenilendi"
          git push
        fi
